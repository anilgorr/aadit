kind = "web"
previewPath = "/"
title = "Aadit Technologies"
version = "1.0.0"

[[services]]
localPort = 3000
name = "Next.js"
paths = ["/"]

[services.env]
PORT = "3000"

[services.development]
run = "pnpm --filter @workspace/aadit-tech run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/aadit-tech", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["pnpm", "--filter", "@workspace/aadit-tech", "run", "start"]

[services.production.run.env]
PORT = "3000"
NODE_ENV = "production"
